<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamond Pulse — Player Spotlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <script src="js/config.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange:      #FF4500;
      --orange-dim:  rgba(255,69,0,0.18);
      --orange-glow: rgba(255,69,0,0.5);
      --white:       #FFFFFF;
      --muted:       rgba(255,255,255,0.55);
      --dark-panel:  rgba(8,4,0,0.90);
      --border:      rgba(255,69,0,0.30);
    }

    html, body {
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: 'Barlow Condensed', sans-serif;
    }

    /* ── Spotlight card — bottom left ── */
    #spotlight-card {
      position: absolute;
      bottom: 64px;
      left: 64px;
      display: flex;
      flex-direction: column;
      background: var(--dark-panel);
      border: 1px solid var(--border);
      border-left: 5px solid var(--orange);
      border-radius: 6px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow:
        0 8px 48px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,69,0,0.08),
        0 0 60px rgba(255,69,0,0.12);
      min-width: 420px;
      max-width: 580px;

      /* Hidden by default */
      opacity: 0;
      transform: translateX(-32px);
      pointer-events: none;
      transition: opacity 0.45s cubic-bezier(0.22,1,0.36,1),
                  transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }

    #spotlight-card.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* Header bar */
    .spo-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px 8px 18px;
      border-bottom: 1px solid rgba(255,69,0,0.15);
    }

    .spo-header-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 8px var(--orange-glow);
      animation: pulse-dot 1.8s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    .spo-header-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3.5px;
      color: var(--orange);
      text-transform: uppercase;
    }

    /* Body */
    .spo-body {
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    /* Number column */
    .spo-number-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 20px 22px;
      background: rgba(255,69,0,0.05);
      border-right: 1px solid rgba(255,69,0,0.12);
      min-width: 110px;
    }

    .spo-number {
      font-family: 'Oswald', sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: var(--orange);
      line-height: 1;
      letter-spacing: -1px;
      text-shadow: 0 0 40px rgba(255,69,0,0.45);
      font-variant-numeric: tabular-nums;
    }

    /* Info column */
    .spo-info-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 24px 20px 20px;
      gap: 6px;
    }

    .spo-name {
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1;
      white-space: nowrap;
    }

    .spo-position {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Photo column (shown only when photo available) */
    .spo-photo-col {
      width: 120px;
      flex-shrink: 0;
      overflow: hidden;
      display: none;
      border-left: 1px solid rgba(255,69,0,0.12);
    }

    .spo-photo-col.has-photo {
      display: block;
    }

    .spo-photo-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
  </style>
</head>
<body>

  <div id="spotlight-card">
    <div class="spo-header">
      <span class="spo-header-dot"></span>
      <span class="spo-header-label">Player Spotlight</span>
    </div>
    <div class="spo-body">
      <div class="spo-number-col">
        <div class="spo-number" id="spo-number">—</div>
      </div>
      <div class="spo-info-col">
        <div class="spo-name"     id="spo-name">—</div>
        <div class="spo-position" id="spo-position"></div>
      </div>
      <div class="spo-photo-col" id="spo-photo-col">
        <img id="spo-photo" src="" alt="">
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = APP_CONFIG.supabaseUrl;
    const SUPABASE_KEY = APP_CONFIG.supabaseKey;

    let currentActive = false;

    async function poll() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/config?key=eq.spotlight&select=value`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await res.json();
        const data = rows?.[0]?.value || {};

        if (data.active && !currentActive) {
          showSpotlight(data);
        } else if (!data.active && currentActive) {
          hideSpotlight();
        }
      } catch(e) { /* silent in production */ }
    }

    function showSpotlight(data) {
      currentActive = true;
      document.getElementById('spo-number').textContent  = data.number   || '—';
      document.getElementById('spo-name').textContent    = (data.name    || '—').toUpperCase();
      document.getElementById('spo-position').textContent = data.position || '';

      const photoCol = document.getElementById('spo-photo-col');
      const photoImg = document.getElementById('spo-photo');
      if (data.photo) {
        photoImg.src = data.photo;
        photoCol.classList.add('has-photo');
      } else {
        photoImg.src = '';
        photoCol.classList.remove('has-photo');
      }

      document.getElementById('spotlight-card').classList.add('visible');
    }

    function hideSpotlight() {
      currentActive = false;
      document.getElementById('spotlight-card').classList.remove('visible');
    }

    // Poll every 1.5 seconds
    poll();
    setInterval(poll, 1500);
  </script>
</body>
</html>
