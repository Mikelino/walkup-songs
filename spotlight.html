<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diamond Pulse — Player Spotlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="js/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: #000;
      overflow: hidden;
    }

    /* ── Full-screen container — two columns ── */
    #spo-card {
      position: absolute;
      inset: 0;
      display: flex;
      pointer-events: none;
    }

    /* ── Left half — text ── */
    #spo-info-layer {
      width: 960px;
      flex-shrink: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 80px 100px;
      opacity: 0;
    }

    /* ── Right half — photo ── */
    #spo-photo-layer {
      flex: 1;
      position: relative;
      overflow: hidden;
      opacity: 0;
    }

    #spo-photo-layer.fade-in {
      animation: fadein-photo 1.2s ease forwards;
    }
    #spo-photo-layer.fade-out {
      animation: fadeout 0.6s ease forwards;
    }

    @keyframes fadein-photo {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeout {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* Circle container centered in the right half */
    #spo-photo-circle {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #spo-photo-circle-inner {
      width: 800px;
      height: 800px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(255,69,0,0.4);
      box-shadow: 0 0 60px rgba(255,69,0,0.2);
      flex-shrink: 0;
    }

    #spo-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* Placeholder when no photo */
    #spo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }
    #spo-placeholder svg {
      opacity: 0.15;
      width: 320px;
      height: 320px;
    }

    #spo-info-layer.fade-in {
      animation: fadein-info 0.8s ease forwards;
    }
    #spo-info-layer.fade-out {
      animation: fadeout 0.4s ease forwards;
    }

    @keyframes fadein-info {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Orange accent bar */
    .spo-accent {
      width: 64px;
      height: 5px;
      background: #FF4500;
      border-radius: 2px;
      margin-bottom: 24px;
      box-shadow: 0 0 24px rgba(255,69,0,0.7);
    }

    .spo-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 6px;
      color: #FF4500;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .spo-number {
      font-family: 'Oswald', sans-serif;
      font-size: 160px;
      font-weight: 700;
      color: #FF4500;
      line-height: 0.9;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 80px rgba(255,69,0,0.5);
      letter-spacing: -4px;
    }

    .spo-name {
      font-family: 'Oswald', sans-serif;
      font-size: 96px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
      margin-top: 8px;
      text-shadow: 0 4px 32px rgba(0,0,0,0.8);
    }

    .spo-pos {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div id="spo-card">

    <!-- Left: text info (fades in after photo) -->
    <div id="spo-info-layer">
      <div class="spo-accent"></div>
      <div class="spo-label">Player Spotlight</div>
      <div class="spo-number" id="spo-num"></div>
      <div class="spo-name"   id="spo-name"></div>
      <div class="spo-pos"    id="spo-pos"></div>
    </div>

    <!-- Right: photo circle (fades in first) -->
    <div id="spo-photo-layer">
      <div id="spo-photo-circle">
        <div id="spo-photo-circle-inner">
          <div id="spo-placeholder">
            <svg viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="30" r="18"/>
              <path d="M15 85 Q15 58 50 58 Q85 58 85 85 Z"/>
            </svg>
          </div>
          <img id="spo-photo" src="" alt="" style="display:none">
        </div>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = APP_CONFIG.supabaseUrl;
    const SUPABASE_KEY = APP_CONFIG.supabaseKey;

    let isVisible = false;

    async function poll() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/config?key=eq.spotlight&select=value`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await res.json();
        const data = rows?.[0]?.value || {};

        if (data.active && !isVisible) {
          showCard(data);
        } else if (!data.active && isVisible) {
          hideCard();
        }
      } catch(e) { /* silent */ }
    }

    function showCard(data) {
      isVisible = true;

      document.getElementById('spo-num').textContent  = data.number   || '';
      document.getElementById('spo-name').textContent = data.name      || '';
      document.getElementById('spo-pos').textContent  = data.position  || '';

      // Photo or placeholder
      const img = document.getElementById('spo-photo');
      const ph  = document.getElementById('spo-placeholder');
      if (data.photo) {
        img.src = data.photo;
        img.style.display = 'block';
        ph.style.display  = 'none';
      } else {
        img.style.display = 'none';
        ph.style.display  = 'flex';
      }

      // Step 1: photo fades in
      const photoLayer = document.getElementById('spo-photo-layer');
      const infoLayer  = document.getElementById('spo-info-layer');
      photoLayer.classList.remove('fade-out');
      infoLayer.classList.remove('fade-in', 'fade-out');
      void photoLayer.offsetWidth; // reflow
      photoLayer.classList.add('fade-in');

      // Step 2: info fades in 900ms later
      setTimeout(() => {
        infoLayer.classList.add('fade-in');
      }, 900);
    }

    function hideCard() {
      isVisible = false;
      const photoLayer = document.getElementById('spo-photo-layer');
      const infoLayer  = document.getElementById('spo-info-layer');

      photoLayer.classList.remove('fade-in');
      infoLayer.classList.remove('fade-in');
      void photoLayer.offsetWidth;
      photoLayer.classList.add('fade-out');
      infoLayer.classList.add('fade-out');
    }

    poll();
    setInterval(poll, 1500);
  </script>
</body>
</html>
