<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamond Pulse — OBS Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════ CONFIG ══ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange:     #FF4500;
      --orange-dim: rgba(255,69,0,0.18);
      --orange-glow:rgba(255,69,0,0.5);
      --white:      #FFFFFF;
      --offwhite:   #E8E8E8;
      --muted:      rgba(255,255,255,0.55);
      --dark:       rgba(8,4,0,0.82);
      --dark-panel: rgba(10,5,0,0.88);
      --border:     rgba(255,69,0,0.25);
    }

    html, body {
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: 'Barlow Condensed', sans-serif;
    }

    /* ── SCOREBOARD — haut gauche ── */
    #scoreboard {
      position: absolute;
      top: 48px;
      left: 48px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      transform: translateY(-16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #scoreboard.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── BSO + RUNNERS — haut droite ── */
    #countsPanel {
      position: absolute;
      top: 48px;
      right: 48px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      opacity: 0;
      transform: translateY(-16px);
      transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
    }
    #countsPanel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Score principal */
    .score-main {
      display: flex;
      align-items: stretch;
      background: var(--dark-panel);
      border: 1px solid var(--border);
      border-left: 4px solid var(--orange);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,69,0,0.1);
    }

    .team-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 10px 18px 10px 14px;
      min-width: 160px;
    }

    .team-block + .team-block {
      border-left: 1px solid var(--border);
    }

    .team-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .team-name {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--white);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .team-block.batting {
      background: rgba(255,69,0,0.08);
    }
    .team-block.batting .team-label::before {
      content: '⚾ ';
      font-size: 9px;
    }
    .team-block.batting .team-name {
      color: var(--orange);
    }

    .score-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      background: var(--orange-dim);
    }

    .score-value {
      font-family: 'Oswald', sans-serif;
      font-size: 38px;
      font-weight: 700;
      color: var(--orange);
      line-height: 1;
      letter-spacing: -1px;
      min-width: 44px;
      text-align: center;
      padding: 10px 14px;
    }

    .score-sep {
      font-family: 'Oswald', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--border);
      padding: 0 2px;
      align-self: center;
    }

    /* Inning */
    .inning-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-left: 1px solid var(--border);
      min-width: 64px;
    }

    .inning-arrow {
      font-size: 11px;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 1px;
    }

    .inning-num {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
    }

    .inning-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* ── COUNTS — BSO ── */
    .counts-row {
      display: flex;
      gap: 6px;
    }

    .count-block {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--dark-panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 7px 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .count-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .count-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 2px;
      transform: rotate(45deg);
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .dot.on-balls   { background: #4CAF50; border-color: #4CAF50; box-shadow: 0 0 6px rgba(76,175,80,0.7); }
    .dot.on-strikes { background: #FF9800; border-color: #FF9800; box-shadow: 0 0 6px rgba(255,152,0,0.7); }
    .dot.on-outs    { background: #f44336; border-color: #f44336; box-shadow: 0 0 6px rgba(244,67,54,0.7); }

    /* ── BATTER CARD — bas droite ── */
    #batterCard {
      position: absolute;
      bottom: 48px;
      right: 48px;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--dark-panel);
      border: 1px solid var(--border);
      border-right: 4px solid var(--orange);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,69,0,0.1);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
    }

    #batterCard.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #batterCard.batter-change {
      animation: batter-flash 0.4s ease;
    }

    @keyframes batter-flash {
      0%   { opacity: 1; transform: translateY(0); }
      30%  { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .batter-photo-wrap {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
      background: rgba(255,69,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .batter-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .batter-avatar-svg {
      opacity: 0.4;
    }

    .batter-info {
      padding: 10px 16px 10px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 180px;
    }

    .batter-lbl {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .batter-name {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
    }

    .batter-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .batter-jersey {
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--orange);
      letter-spacing: 1px;
    }

    .batter-pos {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      background: rgba(255,69,0,0.1);
      border: 1px solid rgba(255,69,0,0.2);
      border-radius: 2px;
      padding: 1px 5px;
    }

    /* ── PITCHER (à gauche du runners-block) ── */
    #pitcherCard {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      /* mêmes dimensions que .runners-block */
      background: var(--dark-panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    #pitcherCard.visible {
      display: flex;
    }
    .pitcher-lbl {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--orange);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .pitcher-name {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1;
      white-space: nowrap;
      text-align: center;
    }
    .pitcher-pitches {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
    }
    .pitcher-count {
      font-family: 'Oswald', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--orange);
      line-height: 1;
    }
    .pitcher-count-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── BATTER UP CHEER ── */
    @keyframes cheer-in {
      0%   { transform: scale(0.5) translateY(20px); opacity: 0; }
      60%  { transform: scale(1.05) translateY(-4px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes sub-in {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── ORANGE PULSE on score change ── */
    @keyframes score-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.25); color: #fff; }
      100% { transform: scale(1); }
    }
    .score-value.popped { animation: score-pop 0.35s ease; }

    /* ── ON DECK CARD ── */
    #onDeckCard {
      position: absolute;
      bottom: 128px;
      right: 48px;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(10,5,0,0.72);
      border: 1px solid rgba(255,69,0,0.15);
      border-right: 3px solid rgba(255,69,0,0.4);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease 0.25s, transform 0.5s ease 0.25s;
    }
    #onDeckCard.visible { opacity: 0.75; transform: translateY(0); }

    .ondeck-photo-wrap {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      background: rgba(255,69,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px solid rgba(255,69,0,0.15);
    }
    .ondeck-photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .ondeck-avatar-svg { opacity: 0.35; }

    .ondeck-info {
      padding: 7px 14px 7px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 150px;
    }
    .ondeck-lbl {
      font-size: 8px;
      letter-spacing: 3px;
      color: rgba(255,69,0,0.6);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .ondeck-name {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .ondeck-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .ondeck-jersey {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,69,0,0.7);
    }
    .ondeck-pos {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    /* ── RUNNERS DIAMOND ── */
    .runners-block {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dark-panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .runners-base {
      transition: fill 0.2s, stroke 0.2s, filter 0.2s;
    }
    .runners-base.occupied {
      fill: var(--orange) !important;
      stroke: var(--orange) !important;
      filter: drop-shadow(0 0 6px rgba(255,69,0,0.9));
    }

    /* ── TEAM LABEL BLOCK (à côté de l'inning) ── */
    .matchup-block {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      border-left: 1px solid var(--border);
      min-width: 60px;
    }
    .matchup-label {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── ERROR STATE ── */
    #errorMsg {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(200,0,0,0.7);
      color: white;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 3px;
      display: none;
      letter-spacing: 1px;
    }

    /* ── SPONSORS — Logo Gold (bas gauche) ── */
    .gold-sponsor {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 10px;
      padding: 10px 16px;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 50;
    }
    .gold-sponsor.visible { opacity: 1; }
    .gold-sponsor img {
      max-width: 140px;
      max-height: 70px;
      object-fit: contain;
      display: block;
    }

    /* ── SPONSORS — Bloc Silver (pleine largeur, monte du bas) ── */
    .silver-block {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: #000000;
      border-top: 3px solid #FF4500;
      transform: translateY(100%);
      transition: transform 0.5s ease-out;
      z-index: 60;
      overflow: hidden;
    }
    .silver-block.visible {
      transform: translateY(0);
      transition: transform 0.5s ease-out;
    }
    .silver-block.hiding {
      transform: translateY(100%);
      transition: transform 0.5s ease-in;
    }
    .silver-block-inner {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .silver-block-track {
      display: flex;
      align-items: center;
      gap: 40px;
      white-space: nowrap;
      will-change: transform;
    }
    .silver-block-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .silver-block-item img {
      height: 44px;
      width: 44px;
      object-fit: contain;
      border-radius: 4px;
    }
    .silver-block-item span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .silver-block-sep {
      color: #FF4500;
      font-size: 22px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="errorMsg"></div>

  <!-- ══ SCOREBOARD — haut gauche ══ -->
  <div id="scoreboard">
    <div class="score-main">
      <div class="team-block">
        <div class="team-label">Home</div>
        <div class="team-name" id="teamHome">BLACK BEARS</div>
      </div>
      <div class="score-value" id="scoreHome">0</div>
      <div class="score-sep">–</div>
      <div class="score-value" id="scoreAway">0</div>
      <div class="team-block">
        <div class="team-label">Visitors</div>
        <div class="team-name" id="teamAway">VISITORS</div>
      </div>
      <div class="inning-block">
        <div class="inning-arrow" id="inningArrow">▲</div>
        <div class="inning-num" id="inningNum">1</div>
        <div class="inning-lbl">Inn.</div>
      </div>
      <div class="matchup-block">
        <div class="matchup-label" id="matchupLabel"></div>
      </div>
    </div>
  </div>

  <!-- ══ BSO + RUNNERS — haut droite ══ -->
  <div id="countsPanel">
    <div class="counts-row">
      <div class="count-block">
        <div class="count-label">B</div>
        <div class="count-dots" id="dotsBalls">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
      <div class="count-block">
        <div class="count-label">S</div>
        <div class="count-dots" id="dotsStrikes">
          <div class="dot"></div><div class="dot"></div>
        </div>
      </div>
      <div class="count-block">
        <div class="count-label">O</div>
        <div class="count-dots" id="dotsOuts">
          <div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>
    <!-- Ligne pitcher + runners -->
    <div style="display:flex;gap:6px;align-items:stretch">
      <!-- Pitcher info — visible only when pitcherName is set -->
      <div id="pitcherCard">
        <div class="pitcher-lbl">⚾ Pitcher</div>
        <div class="pitcher-name" id="pitcherName">—</div>
        <div class="pitcher-pitches">
          <span class="pitcher-count" id="pitchCount">0</span>
          <span class="pitcher-count-lbl">pitches</span>
        </div>
      </div>
      <!-- Runners diamond — taille 80×80 pour éviter tout clipping -->
      <div class="runners-block">
        <svg width="80" height="80" viewBox="0 0 80 80" style="overflow:visible">
          <!-- base lines -->
          <line x1="40" y1="6"  x2="74" y2="40" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
          <line x1="74" y1="40" x2="40" y2="74" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
          <line x1="40" y1="74" x2="6"  y2="40" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
          <line x1="6"  y1="40" x2="40" y2="6"  stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
          <!-- home plate -->
          <polygon points="40,78 34,70 34,64 46,64 46,70"
            fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
          <!-- 2nd base (top) — centré sur 40,6 -->
          <rect id="overlayBase2" class="runners-base"
            x="30" y="-4" width="20" height="20" rx="2"
            transform="rotate(45 40 6)"
            fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
          <!-- 1st base (right) — centré sur 74,40 -->
          <rect id="overlayBase1" class="runners-base"
            x="64" y="30" width="20" height="20" rx="2"
            transform="rotate(45 74 40)"
            fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
          <!-- 3rd base (left) — centré sur 6,40 -->
          <rect id="overlayBase3" class="runners-base"
            x="-4" y="30" width="20" height="20" rx="2"
            transform="rotate(45 6 40)"
            fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- ══ ON DECK CARD ══ -->
  <div id="onDeckCard">
    <div class="ondeck-photo-wrap">
      <img id="onDeckPhoto" src="" alt="" style="display:none">
      <svg class="ondeck-avatar-svg" width="28" height="28" viewBox="0 0 40 40" id="onDeckAvatar">
        <circle cx="20" cy="14" r="9" fill="#555"/>
        <ellipse cx="20" cy="36" rx="14" ry="9" fill="#333"/>
        <ellipse cx="20" cy="10" rx="9" ry="5" fill="rgba(255,69,0,0.5)"/>
      </svg>
    </div>
    <div class="ondeck-info">
      <div class="ondeck-lbl">On Deck</div>
      <div class="ondeck-name" id="onDeckName">—</div>
      <div class="ondeck-meta">
        <div class="ondeck-jersey" id="onDeckJersey"></div>
        <div class="ondeck-pos" id="onDeckPos"></div>
      </div>
    </div>
  </div>

  <!-- ══ SPONSORS — Logo Gold (bas gauche) ══ -->
  <div id="gold-sponsor" class="gold-sponsor hidden">
    <img id="gold-sponsor-img" crossorigin="anonymous" alt="" />
  </div>

  <!-- ══ SPONSORS — Bloc Silver (bas pleine largeur) ══ -->
  <div id="silver-block" class="silver-block">
    <div class="silver-block-inner">
      <div id="silver-block-track" class="silver-block-track"></div>
    </div>
  </div>

  <!-- ══ CHEER OVERLAY ══ -->
  <div id="overlayCheer" style="position:fixed;inset:0;pointer-events:none;z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;flex-direction:column;">
    <div id="overlayCheerText" style="font-family:'Oswald',sans-serif;font-weight:700;font-size:120px;color:#fff;letter-spacing:6px;text-transform:uppercase;transform:scale(0);opacity:0;line-height:1;text-shadow:0 0 40px rgba(255,69,0,0.8);"></div>
    <div id="overlayCheerSub" style="font-family:'Barlow Condensed',sans-serif;font-size:28px;color:#FF4500;letter-spacing:8px;text-transform:uppercase;margin-top:8px;opacity:0;"></div>
  </div>

  <!-- ══ BATTER CARD ══ -->
  <div id="batterCard">
    <div class="batter-photo-wrap">
      <img id="batterPhoto" src="" alt="" style="display:none">
      <svg class="batter-avatar-svg" width="40" height="40" viewBox="0 0 40 40" id="batterAvatar">
        <circle cx="20" cy="14" r="9" fill="#555"/>
        <ellipse cx="20" cy="36" rx="14" ry="9" fill="#333"/>
        <ellipse cx="20" cy="10" rx="9" ry="5" fill="rgba(255,69,0,0.5)"/>
      </svg>
    </div>
    <div class="batter-info">
      <div class="batter-lbl">⚾ At Bat</div>
      <div class="batter-name" id="batterName">—</div>
      <div class="batter-meta">
        <div class="batter-jersey" id="batterJersey"></div>
        <div class="batter-pos" id="batterPos"></div>
      </div>
    </div>
  </div>

  <script>
    // ══ CONFIG (injectée via config.js) ══
    const SUPABASE_URL = APP_CONFIG.supabaseUrl;
    const SUPABASE_KEY = APP_CONFIG.supabaseKey;

    // ══ STATE ══
    let prev = {};
    let teamNames = {};
    let homePlayers   = [];
    let visitorPlayers = [];
    let photoCache = {};
    let prevLastEvent = null;

    // ══ INIT ══
    async function init() {
      await loadAppData();
      document.getElementById('scoreboard').classList.add('visible');
      document.getElementById('countsPanel').classList.add('visible');
      document.getElementById('batterCard').classList.add('visible');
      document.getElementById('onDeckCard').classList.add('visible');
      setInterval(poll, 2000);
    }

    // Charge config complète (teams + players + matchState)
    async function loadAppData(force = true) {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/config?select=key,value`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await res.json();
        const app  = rows.find(r => r.key === 'app')?.value || {};

        console.log('[overlay] app keys:', Object.keys(app));
        console.log('[overlay] app.teams:', app.teams);
        console.log('[overlay] app.allPlayers count:', Object.keys(app.allPlayers || {}).length);

        // Équipe active — currentTeamId sauvegardé par matchSave, sinon premier de la liste
        const currentTeamId = app.currentTeamId || Object.keys(app.teams || {})[0] || '';
        const homeTeam = (app.teams || {})[currentTeamId];
        console.log('[overlay] currentTeamId:', currentTeamId, '| homeTeam:', homeTeam);

        teamNames.home = app.clubSettings?.name || APP_CONFIG.clubName || 'HOME';
        teamNames.away = app.opponentName || 'VISITORS';

        document.getElementById('teamHome').textContent   = teamNames.home.toUpperCase();
        document.getElementById('teamAway').textContent   = teamNames.away.toUpperCase();
        document.getElementById('matchupLabel').textContent = (app.teamLabel || homeTeam?.label || '').toUpperCase();

        // Joueurs — construits depuis team.lineup
        const allPlayers = app.allPlayers || {};
        const lineupEntries = (homeTeam?.lineup || []).filter(e => e && e.present !== false);
        console.log('[overlay] lineupEntries:', lineupEntries.length, lineupEntries);

        homePlayers = lineupEntries.map(e => {
          const p = allPlayers[e.pid];
          if (!p) { console.warn('[overlay] allPlayers missing pid:', e.pid); return null; }
          return { ...p, id: e.pid, jersey: e.jersey || '', position: e.pos || '' };
        }).filter(Boolean);
        console.log('[overlay] homePlayers built:', homePlayers.length, homePlayers.map(p => p.name));

        visitorPlayers = (app.visitorsLineup || []).map((v, i) => ({
          name: v.name || '', jersey: v.jersey || '', position: '', photo: null, id: `visitor_${i}`
        }));

        preloadPhotos(homePlayers);

        // Render initial
        const ms = app.matchState || {};
        renderState(ms, force);
        prev = { ...ms };

      } catch(e) {
        showError('Erreur de connexion Supabase');
        console.error(e);
      }
    }

    // Polling léger — ne recharge que matchState
    async function poll() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/config?key=eq.app&select=value`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await res.json();
        const ms = rows?.[0]?.value?.matchState;
        if (!ms) return;

        // Déclencher l'animation (WALK / STRIKEOUT / CHANGE FIELD) dès que possible
        const lastEvent = ms.lastEvent || null;
        if (lastEvent && lastEvent !== prevLastEvent) {
          const sub = lastEvent === 'WALK' ? '4 BALLS'
                    : lastEvent === 'STRIKEOUT' ? '3 STRIKES'
                    : 'SIDE OUT';
          showOverlayCheer(lastEvent, sub);
        }
        prevLastEvent = lastEvent;

        // Rechargement de page si le lineup a changé
        if (ms.dataVersion && ms.dataVersion !== prev.dataVersion) {
          window.location.reload();
          return;
        }

        // Rechargement des données si batterIdx ou inningTop change
        if (ms.batterIdx !== prev.batterIdx || ms.inningTop !== prev.inningTop) {
          await loadAppData(true);
          return;
        }

        renderState(ms, false);
        prev = { ...ms };
      } catch(e) { /* silencieux en prod */ }
    }

    function renderState(ms, force) {
      if (!ms) return;

      // Scores
      setScore('scoreHome', ms.scoreHome ?? 0, prev.scoreHome, force);
      setScore('scoreAway', ms.scoreAway ?? 0, prev.scoreAway, force);

      // Inning + équipe en offense
      // inningTop=true → visiteurs battent (top of inning)
      // inningTop=false → home batte (bottom of inning)
      const inningTop = ms.inningTop !== false;
      const homeBatting = !inningTop;
      document.getElementById('inningNum').textContent   = ms.inning ?? 1;
      document.getElementById('inningArrow').textContent = inningTop ? '▲' : '▼';

      // Highlight équipe en offense dans le score
      document.getElementById('teamHome')?.closest('.team-block')?.classList.toggle('batting', homeBatting);
      document.getElementById('teamAway')?.closest('.team-block')?.classList.toggle('batting', !homeBatting);
      document.getElementById('scoreHome').style.color = homeBatting  ? 'var(--orange)' : 'rgba(255,255,255,0.35)';
      document.getElementById('scoreAway').style.color = !homeBatting ? 'var(--orange)' : 'rgba(255,255,255,0.35)';

      // Dots
      setDots('dotsBalls',   ms.balls   ?? 0, 3, 'balls');
      setDots('dotsStrikes', ms.strikes ?? 0, 2, 'strikes');
      setDots('dotsOuts',    ms.outs    ?? 0, 2, 'outs');

      // Pitcher
      const pitcherCard = document.getElementById('pitcherCard');
      const hasPitcher  = !!(ms.pitcherName);
      const elPN = document.getElementById('pitcherName');
      const elPC = document.getElementById('pitchCount');
      if (elPN) elPN.textContent = ms.pitcherName || '—';
      if (elPC) elPC.textContent = ms.pitchCount  ?? 0;
      if (pitcherCard) {
        if (hasPitcher) pitcherCard.classList.add('visible');
        else            pitcherCard.classList.remove('visible');
      }

      // Batter + On Deck — choisir lineup selon qui batte
      const players = homeBatting ? homePlayers : visitorPlayers;
      const n = Math.max(players.length, 1);
      const batterIdx = (ms.batterIdx ?? 0) % n;
      const batter  = players[batterIdx];
      const onDeck  = players[(batterIdx + 1) % n];
      if (batter) {
        document.getElementById('batterName').textContent   = batter.name || '—';
        document.getElementById('batterJersey').textContent = batter.jersey ? `#${batter.jersey}` : '';
        document.getElementById('batterPos').textContent    = batter.position || '';
        setPhoto(batter);
      }
      if (onDeck && onDeck !== batter) {
        document.getElementById('onDeckName').textContent   = onDeck.name || '—';
        document.getElementById('onDeckJersey').textContent = onDeck.jersey ? `#${onDeck.jersey}` : '';
        document.getElementById('onDeckPos').textContent    = onDeck.position || '';
        setOnDeckPhoto(onDeck);
      } else {
        document.getElementById('onDeckName').textContent   = '—';
        document.getElementById('onDeckJersey').textContent = '';
        document.getElementById('onDeckPos').textContent    = '';
        const photoEl  = document.getElementById('onDeckPhoto');
        const avatarEl = document.getElementById('onDeckAvatar');
        if (photoEl)  { photoEl.style.display  = 'none'; photoEl.src = ''; }
        if (avatarEl) { avatarEl.style.display  = 'block'; }
      }

      // Runners
      const runners = ms.runners || {};
      const baseMap = { first: 'overlayBase1', second: 'overlayBase2', third: 'overlayBase3' };
      Object.entries(baseMap).forEach(([base, id]) => {
        const el = document.getElementById(id);
        if (!el) return;
        if (runners[base]) {
          el.classList.add('occupied');
          el.setAttribute('fill', 'var(--orange)');
          el.setAttribute('stroke', 'var(--orange)');
        } else {
          el.classList.remove('occupied');
          el.setAttribute('fill', 'rgba(255,255,255,0.08)');
          el.setAttribute('stroke', 'rgba(255,255,255,0.25)');
        }
      });

    }

    function setScore(id, val, oldVal, force) {
      const el = document.getElementById(id);
      el.textContent = val;
      if (!force && val !== oldVal) {
        el.classList.remove('popped');
        void el.offsetWidth; // reflow
        el.classList.add('popped');
        setTimeout(() => el.classList.remove('popped'), 400);
      }
    }

    function setDots(containerId, val, max, type) {
      const dots = document.getElementById(containerId).querySelectorAll('.dot');
      dots.forEach((dot, i) => {
        dot.className = 'dot';
        if (i < val) dot.classList.add(`on-${type}`);
      });
    }

    function setPhoto(batter) {
      const photoEl  = document.getElementById('batterPhoto');
      const avatarEl = document.getElementById('batterAvatar');
      const url = batter.photo || '';
      if (url && !batter.gdprRestricted) {
        photoEl.src = url;
        photoEl.style.display = 'block';
        avatarEl.style.display = 'none';
      } else {
        photoEl.style.display = 'none';
        avatarEl.style.display = 'block';
      }
    }

    function setOnDeckPhoto(player) {
      const photoEl  = document.getElementById('onDeckPhoto');
      const avatarEl = document.getElementById('onDeckAvatar');
      if (!photoEl || !avatarEl) return;
      const url = player.photo || '';
      if (url && !player.gdprRestricted) {
        photoEl.src = url;
        photoEl.style.display = 'block';
        avatarEl.style.display = 'none';
      } else {
        photoEl.style.display = 'none';
        avatarEl.style.display = 'block';
      }
    }

    function preloadPhotos(playerList) { /* photos sont des URLs publiques directes — pas de preload nécessaire */ }

    function showOverlayCheer(text, sub) {
      const ov = document.getElementById('overlayCheer');
      const ct = document.getElementById('overlayCheerText');
      const cs = document.getElementById('overlayCheerSub');
      if (!ov || !ct || !cs) return;

      ct.textContent = text;
      cs.textContent = sub;
      ov.style.opacity = '1';

      ct.style.animation = 'none';
      cs.style.animation = 'none';
      void ct.offsetWidth;

      ct.style.animation = 'cheer-in 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards';
      cs.style.animation = 'sub-in 0.3s 0.3s ease forwards';

      setTimeout(() => {
        ov.style.opacity   = '0';
        ct.style.animation = 'none';
        cs.style.animation = 'none';
        ct.style.transform = 'scale(0)';
        ct.style.opacity   = '0';
        cs.style.opacity   = '0';
      }, 1400);
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    // ═══════════════════════════════════════════════════════
    // SPONSORS — Option D (Mode A ticker + Mode B pause)
    // ═══════════════════════════════════════════════════════

    const clubId     = APP_CONFIG.clubId || 'default';
    let goldSponsors = [];
    let allSponsors  = [];
    let tickerIndex  = 0;
    let pauseIndex   = 0;
    let tickerTimer  = null;
    let pauseTimer   = null;

    // ── Silver ticker state ──
    const TICKER_SPEED      = 80;   // px/s
    const TICKER_AUTO_EVERY = 180;  // seconds between auto appearances
    const TICKER_AUTO_DUR   = 30;   // seconds of auto display

    let silverSponsors  = [];
    let silverAutoTimer = null;
    let silverHideTimer = null;
    let silverAnimation = null;
    let silverManualOn  = false;

    async function _fetchSponsorsByTier(tier) {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/sponsors?club_id=eq.${encodeURIComponent(clubId)}&tier=eq.${tier}&active=eq.true&order=display_order.asc`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        return res.ok ? res.json() : [];
      } catch (e) { return []; }
    }

    async function initSponsors() {
      goldSponsors    = await _fetchSponsorsByTier('gold');
      const silver    = await _fetchSponsorsByTier('silver');
      const bronze    = await _fetchSponsorsByTier('bronze');
      allSponsors     = [...goldSponsors, ...silver, ...bronze];
      tickerIndex     = 0;
      startTicker();
      await initSilverTicker(silver);
    }

    // ── Mode A : ticker discret (Gold uniquement) ──

    function startTicker() {
      if (tickerTimer) clearTimeout(tickerTimer);
      if (!goldSponsors.length) return;
      tickerIndex = 0;
      runTickerCycle();
    }

    function runTickerCycle() {
      const ticker = document.getElementById('sponsor-ticker');
      const img    = document.getElementById('sponsor-ticker-logo');
      const s      = goldSponsors[tickerIndex % goldSponsors.length];
      tickerIndex++;

      if (!s.logo_url) {
        tickerTimer = setTimeout(runTickerCycle, 500);
        return;
      }

      ticker.classList.remove('hidden');
      img.src = s.logo_url;
      img.alt = s.name;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => ticker.classList.add('visible'));
      });

      // visible 8s → fade out → pause 22s → next
      tickerTimer = setTimeout(() => {
        ticker.classList.remove('visible');
        setTimeout(() => {
          tickerTimer = setTimeout(runTickerCycle, 22000);
        }, 500);
      }, 8000);
    }

    // ── Mode B : écran pause plein écran ──

    function startPause() {
      if (tickerTimer) clearTimeout(tickerTimer);
      document.getElementById('sponsor-ticker').classList.remove('visible');
      document.getElementById('sponsor-ticker').classList.add('hidden');
      hideSilverTicker();
      const el = document.getElementById('sponsor-pause');
      el.classList.remove('hidden');
      pauseIndex = 0;
      showPauseSponsor();
    }

    function showPauseSponsor() {
      if (!allSponsors.length) return;
      const s   = allSponsors[pauseIndex % allSponsors.length];
      const el  = document.getElementById('sponsor-pause');
      const dur = s.tier === 'gold' ? 8000 : 6000;

      document.getElementById('pause-logo').src = s.logo_url || '';
      document.getElementById('pause-logo').alt = s.name;
      document.getElementById('pause-name').textContent = s.name;
      document.getElementById('pause-url').textContent  = s.website_url || '';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => el.classList.add('visible'));
      });

      pauseTimer = setTimeout(() => {
        el.classList.remove('visible');
        pauseIndex++;
        setTimeout(showPauseSponsor, 600);
      }, dur);
    }

    function stopPause() {
      if (pauseTimer) clearTimeout(pauseTimer);
      const el = document.getElementById('sponsor-pause');
      el.classList.remove('visible');
      setTimeout(() => {
        el.classList.add('hidden');
        startTicker();
        if (silverManualOn) showSilverTicker(); else scheduleAutoTicker();
      }, 600);
    }

    // ── Silver ticker functions ──

    function buildSilverTicker() {
      const content = document.getElementById('silver-ticker-content');
      if (!silverSponsors.length) return;
      const items = [...silverSponsors, ...silverSponsors]; // duplicate for seamless loop
      content.innerHTML = items.map((s, i) => `
        <span class="silver-ticker-item">
          ${s.logo_url ? `<img src="${s.logo_url}" crossorigin="anonymous" alt="${s.name}" />` : ''}
          <span>${s.name}</span>
        </span>
        ${i < items.length - 1 ? '<span class="silver-ticker-separator">·</span>' : ''}
      `).join('');
    }

    function startSilverScroll() {
      const content  = document.getElementById('silver-ticker-content');
      const totalW   = content.scrollWidth / 2; // half because items are doubled
      const duration = (totalW / TICKER_SPEED) * 1000;
      if (silverAnimation) silverAnimation.cancel();
      silverAnimation = content.animate(
        [{ transform: 'translateX(0)' }, { transform: `translateX(-${totalW}px)` }],
        { duration, iterations: Infinity, easing: 'linear' }
      );
    }

    function showSilverTicker() {
      const el = document.getElementById('silver-ticker');
      if (!silverSponsors.length) return;
      buildSilverTicker();
      el.classList.remove('hidden');
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
      // Wait for slide-up before measuring scrollWidth
      setTimeout(startSilverScroll, 420);
    }

    function hideSilverTicker() {
      const el = document.getElementById('silver-ticker');
      el.classList.remove('visible');
      setTimeout(() => {
        el.classList.add('hidden');
        if (silverAnimation) { silverAnimation.cancel(); silverAnimation = null; }
      }, 400);
    }

    function scheduleAutoTicker() {
      clearTimeout(silverAutoTimer);
      clearTimeout(silverHideTimer);
      silverAutoTimer = setTimeout(() => {
        if (!silverManualOn) {
          showSilverTicker();
          silverHideTimer = setTimeout(() => {
            if (!silverManualOn) hideSilverTicker();
            scheduleAutoTicker();
          }, TICKER_AUTO_DUR * 1000);
        } else {
          scheduleAutoTicker(); // postpone if manual is active
        }
      }, TICKER_AUTO_EVERY * 1000);
    }

    async function initSilverTicker(preloaded) {
      silverSponsors = preloaded ?? await _fetchSponsorsByTier('silver');
      if (silverSponsors.length) scheduleAutoTicker();
    }

    // ── Realtime : écoute sponsor_pause broadcast ──
    try {
      window.supabase
        .channel(`overlay:${clubId}`)
        .on('broadcast', { event: 'sponsor_pause' }, ({ payload }) => {
          payload.active ? startPause() : stopPause();
        })
        .on('broadcast', { event: 'silver_ticker' }, ({ payload }) => {
          if (payload.active) {
            silverManualOn = true;
            clearTimeout(silverHideTimer);
            showSilverTicker();
          } else {
            silverManualOn = false;
            hideSilverTicker();
            scheduleAutoTicker();
          }
        })
        .subscribe();

      // Rechargement si sponsors modifiés en base
      window.supabase
        .channel('sponsors-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'sponsors' }, () => {
          initSponsors();
        })
        .subscribe();
    } catch (e) {
      console.warn('[overlay] Realtime sponsors:', e);
    }

    window.addEventListener('load', initSponsors);

    window.addEventListener('load', init);
  </script>
